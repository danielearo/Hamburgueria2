<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevBurger - Flex & Grid 2025</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Oswald:wght@500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

<!-- Incluir os links para CSS (pode ter mais arquivos ou arquivos com nomes diferentes) -->
    {% block css_adicional %}
    {% endblock %}
    <link rel="stylesheet" href="{{ url_for('static',filename = 'src/css/reset.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static',filename = 'src/css/variables.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static',filename = 'src/css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static',filename = 'src/css/media.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static',filename = 'src/css/sidebar.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static',filename = 'src/css/cadastro_login.css') }}">

    <script src="/static/src/js/carrinho.js"></script>

  </head>
  <body>

<aside class="cart-sidebar">

    <!-- HEADER -->
    <div class="cart-sidebar__header">
        <h2>🛒 Meu Carrinho</h2>
    </div>

    <!-- CONTENT -->
    <div class="cart-sidebar__content" id="cart-items">

        <!-- ITEM EXEMPLO -->
        <div class="cart-item" data-id="123">
            <img src="https://via.placeholder.com/80" alt="Hambúrguer" class="cart-item__image">

            <div class="cart-item__info">
                
                <!-- TOPO (nome + remover) -->
                <div class="cart-item__top">
                    <h3 class="cart-item__name">X-Bacon</h3>
                    <button class="remove-item-btn" title="Remover item">🗑️</button>
                </div>

                <!-- PARTE DE BAIXO -->
                <div class="cart-item__bottom">
                    <span class="cart-item__price">R$ 25,90</span>
                </div>
            </div>
        </div>

    </div>
</aside>

  <!-- Header e Navbar -->
    <header class="header">
      <div class="header__container">
        {{ session.nome }}
        <a href="#" class="header__logo">DevBurger</a>

        <nav class="header__nav">
          <ul class="header__menu">
            <li class="header__item">
              <a href="#" class="header__link">Home</a>
            </li>
            <li class="header__item">
              <a href="#menu" class="header__link">Cardápio</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Sobre</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Contato</a>
            </li>
          </ul>
        </nav>

        <div class="header__social">
          <a href="#" class="header__icon"
            ><span class="material-symbols-outlined">thumb_up</span></a
          >
          <a href="#" class="header__icon"
            ><span class="material-symbols-outlined">photo_camera</span></a
          >
        </div>

        <button class="header__toggle">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </header>
    
    {% block conteudo %}
      Aqui é onde vai todo o conteudo do site
    {% endblock %}

<!-- Rodapé -->
    <footer class="footer">
      <p class="footer__text">
        DevBurger © 2025. Todos os direitos reservados.
      </p>
    </footer>
  </body>

</html>
